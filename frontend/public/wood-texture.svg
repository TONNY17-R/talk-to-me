<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="woodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b3a2c"/>
      <stop offset="50%" stop-color="#7e5a43"/>
      <stop offset="100%" stop-color="#4c2c1b"/>
    </linearGradient>
    <filter id="grain" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="5" seed="7" result="noise"/>
      <feColorMatrix type="saturate" values="0.15"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.8"/>
        <feFuncG type="linear" slope="0.8"/>
        <feFuncB type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <pattern id="rings" patternUnits="userSpaceOnUse" width="200" height="200">
      <path d="M0 100 C 50 120 150 80 200 100" stroke="#3d2b1b" stroke-width="3" fill="none" opacity="0.4"/>
      <path d="M0 120 C 60 140 160 100 200 120" stroke="#2f1e15" stroke-width="2" fill="none" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="800" fill="url(#woodGrad)" filter="url(#grain)"/>
  <rect width="800" height="800" fill="url(#rings)"/>
</svg>
